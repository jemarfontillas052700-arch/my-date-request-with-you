<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Special Surprise ❤️</title>

<link rel="stylesheet" href="style.css">

<!-- Google Font -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<!-- Confetti -->
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
</head>

<body>

<!-- Floating Hearts -->
<div class="hearts"></div>

<!-- Intro -->
<section id="intro" class="screen active">
    <div class="card">
        <h1>💌</h1>
        <h2>A little surprise for you...</h2>
        <p>Tap the button below 🌸</p>

        <button id="openBtn">Open ❤️</button>
    </div>
</section>

<!-- Question -->
<section id="question" class="screen">

<div class="card">

<h1>🌸</h1>

<h2>Will you go on a date with me,<br>Lian Tracy Sadsad? ❤️</h2>

<p>
Life feels brighter whenever I'm with you.
</p>

<div class="buttons">

<button id="yesBtn">YES ❤️</button>

<button id="noBtn">NO 🙈</button>

</div>

</div>

</section>

<!-- Date -->

<section id="planner" class="screen">

<div class="card">

<h2>Let's Plan Our Date 💕</h2>

<input type="date" id="date">

<select id="time">

<option value="">Choose Time</option>

<option>3:00 PM</option>
<option>4:00 PM</option>
<option>5:00 PM</option>
<option>6:00 PM</option>
<option>7:00 PM</option>
<option>8:00 PM</option>

</select>

<select id="food">

<option value="">Choose Food</option>

<option>🍜 Ramen</option>
<option>🍝 Pasta</option>
<option>🍕 Pizza</option>
<option>🍣 Sushi</option>
<option>🍔 Burger</option>
<option>☕ Coffee</option>

</select>

<button id="finishBtn">

Set Our Date 💖

</button>

</div>

</section>

<!-- Success -->

<section id="success" class="screen">

<div class="card">

<h1>🎉</h1>

<h2>It's Official! ❤️</h2>

<p id="summary"></p>

<p>

Thank you for saying YES.

</p>

<h3>

I can't wait to see you! 🌸

</h3>

<p>

— Kenji ❤️

</p>

</div>

</section>

<audio id="bgMusic" loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

<script src="script.js"></script>

</body>
</html>
